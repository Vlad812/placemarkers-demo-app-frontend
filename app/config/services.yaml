# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Responders are stateless but marked as non-shared to prevent state regressions.
    App\Infrastructure\Http\Responder\JsonResponder:
        shared: false
    App\Infrastructure\Http\Responder\RedirectResponder:
        shared: false
    App\Infrastructure\Http\Responder\Auth\:
        resource: '../src/Infrastructure/Http/Responder/Auth/*'
        shared: false
    App\Infrastructure\Http\Responder\Page\:
        resource: '../src/Infrastructure/Http/Responder/Page/*'
        shared: false

    App\Infrastructure\Security\SessionTokenExtractor: ~

    lexik_jwt_authentication.extractor.chain_extractor:
        class: Lexik\Bundle\JWTAuthenticationBundle\TokenExtractor\ChainTokenExtractor
        arguments:
            - ['@App\Infrastructure\Security\SessionTokenExtractor']

    App\Infrastructure\Service\Api\Client\AuthApiClient:
        arguments:
            $authClient: '@auth.client'

    App\Infrastructure\Service\Api\Client\PlacemarkerApiClient:
        arguments:
            $databaseClient: '@database.client'

    App\Infrastructure\Service\Api\Client\SearchApiClient:
        arguments:
            $searchClient: '@search.client'

    App\Infrastructure\Service\Api\Client\CollectionApiClient:
        arguments:
            $collectionClient: '@collection.client'

    App\Infrastructure\Security\AuthSessionStorageInterface: '@App\Infrastructure\Security\AuthSessionStorage'
    App\Infrastructure\Service\IncidentLoggerInterface: '@App\Infrastructure\Service\IncidentLogger'
    App\Infrastructure\Service\Api\AccessTokenProviderInterface: '@App\Infrastructure\Service\Api\AccessTokenProvider'

    App\Application\Port\Api\AuthApiInterface: '@App\Infrastructure\Service\Api\Client\AuthApiClient'
    App\Application\Port\Api\PlacemarkerApiInterface: '@App\Infrastructure\Service\Api\Client\PlacemarkerApiClient'
    App\Application\Port\Api\SearchApiInterface: '@App\Infrastructure\Service\Api\Client\SearchApiClient'
    App\Application\Port\Api\CollectionApiInterface: '@App\Infrastructure\Service\Api\Client\CollectionApiClient'

    App\Infrastructure\Security\EventListener\ClearSessionCookieListener:
        arguments:
            $sessionStorageOptions: '%session.storage.options%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
