services:

  app-frontend-pm:
    image: app-frontend-pm-image
    container_name: app-frontend-pm
    build:
      context: .
      dockerfile: ./Docker/RR/Dockerfile
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: dev
      APP_SECRET: 75914121030ad559bbae482519258ce1
      APP_RUNTIME: Baldinof\RoadRunnerBundle\Runtime\Runtime
      VAR_DUMPER_FORMAT: 'server'
      VAR_DUMPER_SERVER: 'buggregator:9912'
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=place_markers_net"
      - "traefik.http.routers.app-frontend-app.rule=Host(`placemarkers.local`)"
      - "traefik.http.routers.app-frontend-app.entrypoints=web"
      - "traefik.http.services.app-frontend-app.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - place_markers_net

  app-frontend-node-pm:
    image: node:24-alpine
    container_name: app-frontend-node-pm
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    command: tail -f /dev/null
    networks:
      - place_markers_net

  app-frontend-pm-php-cli:
    image: app-frontend-pm-php-cli-image
    build:
      dockerfile: ./Docker/cli/Dockerfile
    container_name: app-frontend-pm-php-cli
    volumes:
      - ./app:/var/www/html
    networks:
      - place_markers_net

networks:
  place_markers_net:
    external: true